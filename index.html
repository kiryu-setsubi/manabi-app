<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>まなびアドベンチャーPRO</title>

<style>
body {
  font-family: sans-serif;
  background:#0f172a;
  color:#fff;
  text-align:center;
  margin:0;
}

h1 {
  padding:20px;
}

.choice {
  display:block;
  margin:10px auto;
  padding:18px;
  width:85%;
  font-size:22px;
  border-radius:14px;
  border:none;
  background:linear-gradient(135deg,#4f46e5,#06b6d4);
  color:#fff;
}

.message {
  margin-top:15px;
  font-size:24px;
  font-weight:bold;
}

.good { color:#22c55e; }
.bad { color:#ef4444; }

.card {
  background:#1e293b;
  margin:20px;
  padding:20px;
  border-radius:20px;
}
</style>
</head>

<body>

<h1>🎓 まなびアドベンチャー</h1>

<div class="card">
  <h2 id="question">問題</h2>
  <div id="choices"></div>
  <div id="msg" class="message"></div>
</div>

<script>
let current = 0;
let score = 0;

const quiz = [
  {
    q:"りんごはどれ？",
    choices:["🍎","🐶","🚗"],
    answer:"🍎"
  },
  {
    q:"ねこはどれ？",
    choices:["🐱","🐟","🐸"],
    answer:"🐱"
  },
  {
    q:"2 + 3 は？",
    choices:["4","5","6"],
    answer:"5"
  },
  {
    q:"5 - 2 は？",
    choices:["2","3","4"],
    answer:"3"
  }
];

function renderQuiz(){
  const q = quiz[current];

  document.getElementById("question").innerText = q.q;
  document.getElementById("msg").innerText = "";

  const choicesDiv = document.getElementById("choices");
  choicesDiv.innerHTML = "";

  q.choices.forEach(choice => {
    const btn = document.createElement("button");
    btn.innerText = choice;
    btn.className = "choice";

    // ⭐ここが超重要（バグ修正ポイント）
    btn.addEventListener("click", function(){
      checkAnswer(choice);
    });

    choicesDiv.appendChild(btn);
  });
}

function checkAnswer(choice){
  const q = quiz[current];
  const msg = document.getElementById("msg");

  if(choice === q.answer){
    msg.className = "message good";
    msg.innerText = "⭕ せいかい！";
    score++;

    setTimeout(()=>{
      current++;
      if(current < quiz.length){
        renderQuiz();
      } else {
        finishGame();
      }
    },600);

  } else {
    msg.className = "message bad";
    msg.innerText = "❌ ちがう！";
  }
}

function finishGame(){
  document.querySelector(".card").innerHTML = `
    <h2>🎉 クリア！</h2>
    <p>スコア：${score} / ${quiz.length}</p>
    <button class="choice" onclick="restart()">もう一回</button>
  `;
}

function restart(){
  current = 0;
  score = 0;
  location.reload();
}

renderQuiz();
</script>

</body>
</html>
