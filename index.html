<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>まなびアドベンチャーPRO</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0b1437;
  color:#fff;
}

.screen { display:none; }
.active { display:block; }

.container {
  padding:20px;
}

h1 {
  text-align:center;
  font-size:34px;
}

.card {
  background:#1f2b4d;
  padding:20px;
  border-radius:20px;
  margin-top:20px;
}

button {
  width:100%;
  padding:15px;
  margin-top:10px;
  border:none;
  border-radius:15px;
  font-size:20px;
  color:#fff;
  background:linear-gradient(135deg,#4f46e5,#06b6d4);
  
  /* 🔥超重要（タップバグ対策） */
  position:relative;
  z-index:10;
  pointer-events:auto;
}

.choice {
  font-size:24px;
}

.good { color:#22c55e; }
.bad { color:#ef4444; }

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
</style>
</head>

<body>

<!-- ログイン -->
<div id="login" class="screen active container">
  <h1>🎓 まなびアドベンチャー</h1>

  <div class="card">
    <input id="name" placeholder="なまえ" style="width:100%;padding:10px;border-radius:10px;border:none;">
    <button onclick="start()">スタート</button>
  </div>
</div>

<!-- メイン -->
<div id="main" class="screen container">
  <h1 id="welcome"></h1>

  <div class="card">
    <p>コイン：<span id="coin">0</span></p>
    <p>レベル：<span id="level">1</span></p>
  </div>

  <div class="card">
    <button onclick="startGame()">クイズスタート</button>
  </div>
</div>

<!-- ゲーム -->
<div id="game" class="screen container">
  <h1 id="question"></h1>
  <div id="choices"></div>
  <p id="msg"></p>
</div>

<script>
let coin = 0;
let level = 1;
let current = 0;

const quiz = [
  {q:"りんごはどれ？", choices:["🍎","🐶","🚗"], a:"🍎"},
  {q:"ねこはどれ？", choices:["🐱","🐟","🐸"], a:"🐱"},
  {q:"2+2は？", choices:["3","4","5"], a:"4"}
];

function start(){
  const name = document.getElementById("name").value || "プレイヤー";
  document.getElementById("welcome").innerText = name;
  show("main");
}

function show(id){
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function startGame(){
  current = 0;
  show("game");
  render();
}

function render(){
  const q = quiz[current];
  document.getElementById("question").innerText = q.q;

  const box = document.getElementById("choices");
  box.innerHTML = "";

  q.choices.forEach(c=>{
    const btn = document.createElement("button");
    btn.className="choice";
    btn.innerText=c;

    // 🔥タップバグ完全対策
    btn.addEventListener("click", ()=>{
      answer(c);
    });

    box.appendChild(btn);
  });

  document.getElementById("msg").innerText="";
}

function answer(c){
  const q = quiz[current];

  if(c===q.a){
    coin+=5;
    document.getElementById("msg").innerText="⭕せいかい！";
    document.getElementById("msg").className="good";

    setTimeout(()=>{
      current++;
      if(current<quiz.length){
        render();
      }else{
        level++;
        show("main");
        document.getElementById("coin").innerText=coin;
        document.getElementById("level").innerText=level;
      }
    },500);

  }else{
    document.getElementById("msg").innerText="❌ちがう！";
    document.getElementById("msg").className="bad";
  }
}
</script>

</body>
</html>
