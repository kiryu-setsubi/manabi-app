<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>わくわく まなびアプリ</title>
  <style>
    :root{
      --bg1:#fff8e7;
      --bg2:#e8f7ff;
      --card:#ffffff;
      --text:#24324a;
      --accent:#ff9f1c;
      --accent2:#2ec4b6;
      --accent3:#6c63ff;
      --good:#24b36b;
      --bad:#ef476f;
      --shadow:0 12px 30px rgba(36,50,74,.12);
      --radius:24px;
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;
      color:var(--text);
      background:linear-gradient(135deg,var(--bg1),var(--bg2));
      min-height:100vh;
    }

    .wrap{
      max-width:1000px;
      margin:0 auto;
      padding:20px 16px 40px;
    }

    .header{
      text-align:center;
      padding:8px 0 18px;
    }

    .title{
      margin:8px 0 6px;
      font-size:clamp(28px,5vw,44px);
      font-weight:900;
      letter-spacing:.03em;
    }

    .subtitle{
      font-size:clamp(14px,2.8vw,18px);
      opacity:.85;
    }

    .statusbar{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      justify-content:center;
      margin:18px 0 22px;
    }

    .pill{
      background:rgba(255,255,255,.85);
      border:2px solid rgba(255,255,255,.8);
      box-shadow:var(--shadow);
      border-radius:999px;
      padding:10px 16px;
      font-weight:800;
    }

    .screen{display:none}
    .screen.active{display:block}

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(210px,1fr));
      gap:16px;
      margin-top:18px;
    }

    .menu-card{
      background:var(--card);
      border-radius:var(--radius);
      padding:18px;
      box-shadow:var(--shadow);
      border:3px solid rgba(255,255,255,.75);
      cursor:pointer;
      user-select:none;
      transition:transform .15s ease;
      position:relative;
      z-index:1;
    }

    .menu-card:active{
      transform:scale(.99);
    }

    .menu-emoji{
      font-size:44px;
      margin-bottom:10px;
    }

    .menu-title{
      font-size:24px;
      font-weight:900;
      margin-bottom:6px;
    }

    .menu-desc{
      line-height:1.6;
      opacity:.9;
      font-size:15px;
    }

    .panel{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
      border:3px solid rgba(255,255,255,.75);
    }

    .top-actions{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      margin-bottom:16px;
      flex-wrap:wrap;
    }

    .game-title{
      font-size:clamp(24px,4vw,34px);
      font-weight:900;
    }

    .button-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    button{
      border:none;
      border-radius:18px;
      padding:14px 18px;
      font-size:18px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 8px 18px rgba(0,0,0,.08);
      position:relative;
      z-index:10;
      pointer-events:auto;
      touch-action:manipulation;
    }

    button.primary{background:var(--accent); color:#fff}
    button.secondary{background:var(--accent2); color:#fff}
    button.purple{background:var(--accent3); color:#fff}
    button.white{background:#fff; color:var(--text)}

    button.choice{
      min-height:78px;
      font-size:clamp(28px,5vw,42px);
      background:linear-gradient(135deg,#5b53ff,#21c8e8);
      color:#fff;
      width:100%;
      position:relative;
      z-index:20;
      pointer-events:auto;
      touch-action:manipulation;
    }

    .question{
      text-align:center;
      font-weight:900;
      font-size:clamp(28px,5vw,54px);
      margin:18px 0 20px;
      line-height:1.4;
    }

    .choices{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
      gap:14px;
    }

    .center{text-align:center}

    .big{
      font-size:clamp(40px,9vw,90px);
      font-weight:900;
      line-height:1.1;
    }

    .message{
      margin-top:16px;
      min-height:36px;
      font-size:clamp(18px,3vw,24px);
      text-align:center;
      font-weight:900;
    }

    .good{color:var(--good)}
    .bad{color:var(--bad)}

    .progress{
      height:16px;
      background:#eef2f7;
      border-radius:999px;
      overflow:hidden;
      margin:8px 0 18px;
    }

    .progress > div{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      transition:width .25s ease;
    }

    .memory-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      margin-top:16px;
    }

    .memory-card{
      aspect-ratio:1/1;
      border-radius:18px;
      font-size:clamp(22px,5vw,44px);
      font-weight:900;
      background:#fff;
      border:3px solid #edf1f7;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      user-select:none;
      box-shadow:0 8px 18px rgba(0,0,0,.06);
      position:relative;
      z-index:20;
      pointer-events:auto;
      touch-action:manipulation;
    }

    .memory-card.hidden{
      background:linear-gradient(135deg,#ffd166,#ff9f1c);
      color:transparent;
    }

    .result-box{
      text-align:center;
      padding:18px;
      margin-top:18px;
      border-radius:20px;
      background:#f8fbff;
      border:2px dashed #d7e5f3;
    }

    .stars{
      font-size:clamp(28px,5vw,46px);
      letter-spacing:.1em;
      margin-top:8px;
    }

    .footer-note{
      text-align:center;
      margin-top:18px;
      opacity:.75;
      font-weight:700;
    }

    @media (max-width:640px){
      .memory-grid{gap:8px}
      button{font-size:16px;padding:13px 16px}
      .menu-title{font-size:22px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="title">🌟 わくわく まなびアプリ 🌟</div>
      <div class="subtitle">6さいごろ向け たのしく あそんで べんきょうしよう！</div>
    </div>

    <div class="statusbar">
      <div class="pill">🏆 ほし: <span id="starCount">0</span></div>
      <div class="pill">🎯 れんぞくせいかい: <span id="comboCount">0</span></div>
      <div class="pill">🎉 クリアしたゲーム: <span id="clearCount">0</span></div>
    </div>

    <section id="homeScreen" class="screen active">
      <div class="grid">
        <div class="menu-card" data-game="hiragana">
          <div class="menu-emoji">🔤</div>
          <div class="menu-title">ひらがな</div>
          <div class="menu-desc">もんだいを みて、ただしい ひらがなを タップ！</div>
        </div>

        <div class="menu-card" data-game="math">
          <div class="menu-emoji">➕</div>
          <div class="menu-title">すうじ</div>
          <div class="menu-desc">たしざん・ひきざんを 3たくで こたえよう！</div>
        </div>

        <div class="menu-card" data-game="memory">
          <div class="menu-emoji">🧠</div>
          <div class="menu-title">きおくゲーム</div>
          <div class="menu-desc">おなじ えを そろえる しんけいすいじゃく！</div>
        </div>
      </div>

      <div class="panel" style="margin-top:18px;">
        <div class="game-title center">📚 このアプリで できること</div>
        <p class="center" style="font-size:18px;line-height:1.8;">
          ひらがな・すうじ・きおくりょくを、<br>
          ゲームみたいに たのしく れんしゅう できるよ。
        </p>
        <div class="footer-note">開いたらすぐ遊べる、シンプルで使いやすい版です。</div>
      </div>
    </section>

    <section id="gameScreen" class="screen">
      <div class="panel">
        <div class="top-actions">
          <div class="game-title" id="gameTitle">ゲーム</div>
          <div class="button-row">
            <button class="white" id="homeBtn">🏠 もどる</button>
            <button class="secondary" id="retryBtn">🔄 もういちど</button>
          </div>
        </div>
        <div class="progress"><div id="progressBar"></div></div>
        <div id="gameArea"></div>
      </div>
    </section>
  </div>

  <script>
    const appState = {
      stars: 0,
      combo: 0,
      clears: 0,
      currentGame: null
    };

    const gameData = {
      hiragana: [
        { prompt: "「りんご」の さいしょの もじは？", answer: "り", choices: ["り", "れ", "る"] },
        { prompt: "「ねこ」の さいしょの もじは？", answer: "ね", choices: ["ぬ", "ね", "の"] },
        { prompt: "「いぬ」の さいしょの もじは？", answer: "い", choices: ["あ", "い", "う"] },
        { prompt: "「さかな」の さいしょの もじは？", answer: "さ", choices: ["さ", "し", "す"] },
        { prompt: "「もも」の さいしょの もじは？", answer: "も", choices: ["ま", "も", "め"] }
      ],
      math: [
        { prompt: "2 + 1 は？", answer: "3", choices: ["2", "3", "4"] },
        { prompt: "5 - 2 は？", answer: "3", choices: ["3", "2", "4"] },
        { prompt: "4 + 3 は？", answer: "7", choices: ["7", "6", "8"] },
        { prompt: "8 - 5 は？", answer: "3", choices: ["4", "2", "3"] },
        { prompt: "6 + 2 は？", answer: "8", choices: ["8", "7", "9"] }
      ],
      memory: ["🐶","🐱","🐼","🦁","🐶","🐱","🐼","🦁"]
    };

    const gameState = {
      index: 0,
      score: 0,
      flipped: [],
      matched: 0,
      lock: false,
      memoryCards: []
    };

    const homeScreen = document.getElementById("homeScreen");
    const gameScreen = document.getElementById("gameScreen");
    const gameArea = document.getElementById("gameArea");
    const gameTitle = document.getElementById("gameTitle");
    const progressBar = document.getElementById("progressBar");

    function updateStatus(){
      document.getElementById("starCount").textContent = appState.stars;
      document.getElementById("comboCount").textContent = appState.combo;
      document.getElementById("clearCount").textContent = appState.clears;
    }

    function setProgress(value){
      progressBar.style.width = Math.max(0, Math.min(100, value)) + "%";
    }

    function shuffle(arr){
      return [...arr].sort(() => Math.random() - 0.5);
    }

    function goHome(){
      appState.currentGame = null;
      homeScreen.classList.add("active");
      gameScreen.classList.remove("active");
      setProgress(0);
    }

    function openGame(name){
      appState.currentGame = name;
      gameState.index = 0;
      gameState.score = 0;
      gameState.flipped = [];
      gameState.matched = 0;
      gameState.lock = false;

      homeScreen.classList.remove("active");
      gameScreen.classList.add("active");

      if(name === "hiragana"){
        gameTitle.textContent = "🔤 ひらがなゲーム";
        renderQuiz("hiragana");
      } else if(name === "math"){
        gameTitle.textContent = "➕ すうじゲーム";
        renderQuiz("math");
      } else if(name === "memory"){
        gameTitle.textContent = "🧠 きおくゲーム";
        startMemoryGame();
      }
    }

    function restartCurrentGame(){
      if(appState.currentGame){
        openGame(appState.currentGame);
      }
    }

    function rewardStars(n = 1){
      appState.stars += n;
      updateStatus();
    }

    function renderQuiz(type){
      const list = gameData[type];
      const item = list[gameState.index];
      const percent = (gameState.index / list.length) * 100;
      setProgress(percent);

      gameArea.innerHTML = `
        <div class="question">${item.prompt}</div>
        <div id="choicesWrap" class="choices"></div>
        <div class="message" id="quizMessage"></div>
      `;

      const choicesWrap = document.getElementById("choicesWrap");

      shuffle(item.choices).forEach(choice => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "choice";
        btn.textContent = choice;
        btn.addEventListener("click", () => checkQuizAnswer(type, choice));
        choicesWrap.appendChild(btn);
      });
    }

    function checkQuizAnswer(type, choice){
      const item = gameData[type][gameState.index];
      const msg = document.getElementById("quizMessage");

      if(choice === item.answer){
        appState.combo += 1;
        gameState.score += 1;
        rewardStars(1);

        msg.className = "message good";
        msg.textContent = "⭕ せいかい！";

        setTimeout(() => {
          gameState.index += 1;
          if(gameState.index < gameData[type].length){
            renderQuiz(type);
          } else {
            finishQuiz(type);
          }
          updateStatus();
        }, 500);

      } else {
        appState.combo = 0;
        msg.className = "message bad";
        msg.textContent = "❌ ちがうよ〜";
        updateStatus();
      }
    }

    function finishQuiz(type){
      setProgress(100);
      appState.clears += 1;
      updateStatus();

      const score = gameState.score;
      const total = gameData[type].length;
      const stars = score === total ? "★★★" : score >= total - 1 ? "★★☆" : "★☆☆";

      if(score === total) rewardStars(2);

      gameArea.innerHTML = `
        <div class="result-box">
          <div class="big">${score} / ${total}</div>
          <div class="message good">🎉 クリア！ よくできました！</div>
          <div class="stars">${stars}</div>
          <div style="margin-top:16px;" class="button-row center">
            <button class="primary" id="againBtn">もういちど</button>
            <button class="purple" id="menuBtn">メニューへ</button>
          </div>
        </div>
      `;

      document.getElementById("againBtn").addEventListener("click", restartCurrentGame);
      document.getElementById("menuBtn").addEventListener("click", goHome);
    }

    function startMemoryGame(){
      gameState.memoryCards = shuffle(gameData.memory).map((emoji, index) => ({
        id:index,
        emoji,
        open:false,
        matched:false
      }));

      setProgress(0);
      renderMemoryGame();
    }

    function renderMemoryGame(){
      const matchedPairs = gameState.matched / 2;
      const totalPairs = gameData.memory.length / 2;
      setProgress((matchedPairs / totalPairs) * 100);

      gameArea.innerHTML = `
        <div class="question">おなじ えを 2まい そろえよう！</div>
        <div id="memoryGrid" class="memory-grid"></div>
        <div class="message" id="memoryMessage"></div>
      `;

      const memoryGrid = document.getElementById("memoryGrid");

      gameState.memoryCards.forEach((card, i) => {
        const cell = document.createElement("button");
        cell.type = "button";
        cell.className = "memory-card" + ((!card.open && !card.matched) ? " hidden" : "");
        cell.textContent = (card.open || card.matched) ? card.emoji : "？";
        cell.addEventListener("click", () => flipMemoryCard(i));
        memoryGrid.appendChild(cell);
      });
    }

    function flipMemoryCard(index){
      if(gameState.lock) return;

      const card = gameState.memoryCards[index];
      if(card.open || card.matched) return;

      card.open = true;
      gameState.flipped.push(index);
      renderMemoryGame();

      if(gameState.flipped.length === 2){
        gameState.lock = true;

        const [a,b] = gameState.flipped;
        const cardA = gameState.memoryCards[a];
        const cardB = gameState.memoryCards[b];
        const msg = document.getElementById("memoryMessage");

        if(cardA.emoji === cardB.emoji){
          cardA.matched = true;
          cardB.matched = true;
          gameState.matched += 2;
          gameState.flipped = [];
          appState.combo += 1;
          rewardStars(1);

          msg.className = "message good";
          msg.textContent = "⭕ そろった！";

          gameState.lock = false;
          renderMemoryGame();
          updateStatus();

          if(gameState.matched === gameState.memoryCards.length){
            setTimeout(finishMemoryGame, 450);
          }

        } else {
          appState.combo = 0;
          msg.className = "message bad";
          msg.textContent = "❌ ちがった！";
          updateStatus();

          setTimeout(() => {
            cardA.open = false;
            cardB.open = false;
            gameState.flipped = [];
            gameState.lock = false;
            renderMemoryGame();
          }, 700);
        }
      }
    }

    function finishMemoryGame(){
      setProgress(100);
      appState.clears += 1;
      rewardStars(2);
      updateStatus();

      gameArea.innerHTML = `
        <div class="result-box">
          <div class="big">クリア！</div>
          <div class="message good">🧠 きおくりょく ばっちり！</div>
          <div class="stars">★★★</div>
          <div style="margin-top:16px;" class="button-row center">
            <button class="primary" id="memoryAgainBtn">もういちど</button>
            <button class="purple" id="memoryMenuBtn">メニューへ</button>
          </div>
        </div>
      `;

      document.getElementById("memoryAgainBtn").addEventListener("click", restartCurrentGame);
      document.getElementById("memoryMenuBtn").addEventListener("click", goHome);
    }

    document.querySelectorAll(".menu-card").forEach(card => {
      card.addEventListener("click", () => openGame(card.dataset.game));
    });

    document.getElementById("homeBtn").addEventListener("click", goHome);
    document.getElementById("retryBtn").addEventListener("click", restartCurrentGame);

    updateStatus();
  </script>
</body>
</html>
